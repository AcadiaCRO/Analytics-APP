name: Restart PM2 on AWS (main/staging)

on:
    push:
        branches:
            - main
            - staging

permissions:
    contents: read

concurrency:
    group: restart-pm2-${{ github.ref }}
    cancel-in-progress: true

jobs:
    restart-main:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Restart PM2 production process via SSM
              env:
                  INSTANCE_ID: ${{ secrets.AWS_MAIN_INSTANCE_ID }}
                  APP_DIR: ${{ secrets.AWS_APP_DIR }}
                  PM2_PROCESS_NAME: ${{ secrets.PM2_MAIN_PROCESS_NAME }}
              run: |
                  COMMAND_ID=$(aws ssm send-command \
                    --instance-ids "$INSTANCE_ID" \
                    --document-name "AWS-RunShellScript" \
                    --comment "Deploy + restart PM2 (main) for ${GITHUB_SHA}" \
                    --parameters commands="[
                      \"set -e\",
                      \"cd ${APP_DIR}\",
                      \"git fetch origin main\",
                      \"git reset --hard origin/main\",
                      \"npm ci --omit=dev\",
                      \"pm2 restart ${PM2_PROCESS_NAME}\",
                      \"pm2 save\"
                    ]" \
                    --query 'Command.CommandId' \
                    --output text)

                  aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
                  aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
                  aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text

    restart-staging:
        if: github.ref == 'refs/heads/staging'
        runs-on: ubuntu-latest
        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Restart PM2 staging process via SSM
              env:
                  INSTANCE_ID: ${{ secrets.AWS_STAGING_INSTANCE_ID }}
                  APP_DIR: ${{ secrets.AWS_APP_DIR }}
                  PM2_PROCESS_NAME: ${{ secrets.PM2_STAGING_PROCESS_NAME }}
              run: |
                  COMMAND_ID=$(aws ssm send-command \
                    --instance-ids "$INSTANCE_ID" \
                    --document-name "AWS-RunShellScript" \
                    --comment "Deploy + restart PM2 (staging) for ${GITHUB_SHA}" \
                    --parameters commands="[
                      \"set -e\",
                      \"cd ${APP_DIR}\",
                      \"git fetch origin staging\",
                      \"git reset --hard origin/staging\",
                      \"npm ci --omit=dev\",
                      \"pm2 restart ${PM2_PROCESS_NAME}\",
                      \"pm2 save\"
                    ]" \
                    --query 'Command.CommandId' \
                    --output text)

                  aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
                  aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
                  aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
